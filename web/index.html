<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Merchant Directory — curated e-commerce resources for entrepreneurs. Marketplaces, print-on-demand, payment, shipping, marketing, and design tools.">
    <meta name="theme-color" content="#f59e0b">
    <title>Merchant Directory — E-commerce Resources for Entrepreneurs</title>
    <style>
        :root {
            --bg: #0b0d12;
            --bg-elev: #141821;
            --bg-elev-2: #1c2230;
            --border: #262d3d;
            --border-strong: #3a4358;
            --text: #e8ecf3;
            --text-muted: #94a0b8;
            --text-dim: #6b7688;
            --gold: #f59e0b;
            --gold-dim: #b27406;
            --gold-soft: rgba(245, 158, 11, 0.15);
            --check: #34d399;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at top, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(66, 99, 235, 0.06) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(20, 24, 33, 0.8) 0%, transparent 100%);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            display: grid;
            place-items: center;
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.35);
            font-weight: 900;
            color: #1a1203;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
        }

        header h1 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            letter-spacing: -0.03em;
            font-weight: 800;
            margin: 0;
        }

        header p.tagline {
            color: var(--text-muted);
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            margin-top: 0.5rem;
            max-width: 42rem;
            margin-left: auto;
            margin-right: auto;
        }

        .stat-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .stat-row span strong {
            color: var(--gold);
            font-weight: 700;
        }

        .controls {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(11, 13, 18, 0.85);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
        }

        .controls-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .search-wrap {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-dim);
        }

        #searchInput {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        #searchInput::placeholder {
            color: var(--text-dim);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-soft);
        }

        .category-nav {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-bottom: 0.25rem;
            -webkit-overflow-scrolling: touch;
        }

        .category-nav::-webkit-scrollbar {
            height: 4px;
        }

        .category-nav::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 4px;
        }

        .category-btn {
            padding: 0.55rem 1rem;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.18s ease;
            font-size: 0.88rem;
            font-weight: 500;
            white-space: nowrap;
            color: var(--text-muted);
            font-family: inherit;
        }

        .category-btn:hover {
            background: var(--bg-elev-2);
            color: var(--text);
            border-color: var(--border-strong);
        }

        .category-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #1a1203;
            font-weight: 600;
        }

        .category-btn .count {
            opacity: 0.7;
            margin-left: 0.35rem;
            font-size: 0.78rem;
        }

        main {
            flex: 1;
            padding: 2rem 1.5rem 3rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .results-meta {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
            gap: 1.25rem;
        }

        .resource-card {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .resource-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-lg);
        }

        .resource-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .resource-card h3 {
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .category-tag {
            display: inline-block;
            background: var(--gold-soft);
            color: var(--gold);
            padding: 0.2rem 0.65rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border: 1px solid rgba(245, 158, 11, 0.25);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .resource-card p.desc {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.55;
            margin-bottom: 1rem;
        }

        .features {
            margin-bottom: 1.25rem;
        }

        .features h4 {
            color: var(--text-dim);
            font-size: 0.72rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .features ul {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.35rem 0.75rem;
        }

        .features li {
            color: var(--text-muted);
            font-size: 0.82rem;
            padding-left: 1.1rem;
            position: relative;
        }

        .features li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.55em;
            width: 8px;
            height: 4px;
            border-left: 2px solid var(--check);
            border-bottom: 2px solid var(--check);
            transform: rotate(-45deg);
        }

        .visit-link {
            margin-top: auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 0.65rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
            font-family: inherit;
        }

        .visit-link:hover {
            background: var(--gold);
            color: #1a1203;
        }

        .visit-link:active {
            transform: scale(0.98);
        }

        .visit-link .arrow {
            transition: transform 0.18s ease;
        }

        .visit-link:hover .arrow {
            transform: translateX(3px);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            background: var(--bg-elev);
            border: 1px dashed var(--border-strong);
            border-radius: var(--radius);
        }

        .no-results h3 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        footer {
            padding: 2rem 1.5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        footer a {
            color: var(--gold);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            header { padding: 2rem 1rem 1.5rem; }
            .controls { padding: 0.75rem 1rem; }
            main { padding: 1.5rem 1rem 2rem; }
            .resource-card { padding: 1.25rem; }
            .features ul { grid-template-columns: 1fr; }
            .stat-row { gap: 1.25rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">M</div>
        </div>
        <h1>Merchant Directory</h1>
        <p class="tagline">A curated directory of the tools and platforms that help entrepreneurs launch and run online businesses.</p>
        <div class="stat-row">
            <span><strong id="statCount">30</strong> resources</span>
            <span><strong>7</strong> categories</span>
            <span><strong>100%</strong> free to browse</span>
        </div>
    </header>

    <section class="controls" aria-label="Filters">
        <div class="controls-inner">
            <div class="search-wrap">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="Search resources, features, or categories..." autocomplete="off" spellcheck="false" aria-label="Search resources">
            </div>
            <nav class="category-nav" id="categoryNav" aria-label="Category filter"></nav>
        </div>
    </section>

    <main>
        <div class="results-meta" id="resultsMeta"></div>
        <div class="resources-grid" id="resourcesGrid" aria-live="polite"></div>
    </main>

    <footer>
        <p>Built for entrepreneurs and small business owners.
        <a href="https://github.com/GuildMasterDev/Merchant" target="_blank" rel="noopener noreferrer">View on GitHub</a>
        &middot; Links open in a new tab.</p>
    </footer>

    <script>
        const resources = [
            {
                name: "Etsy",

            },
            {
                name: "Printful",

                description: "Print-on-demand dropshipping service for custom t-shirts, hoodies, accessories, and home decor.",
                features: ["No upfront costs", "Global fulfillment", "Mockup generator", "Integration tools", "White label"],
                url: "https://www.printful.com"
            },
            {
                name: "Printify",
                category: "print-on-demand",
                description: "Print-on-demand platform with a network of print providers worldwide.",
                features: ["Multiple print providers", "Competitive pricing", "Product designer", "API access", "Sample ordering"],
                url: "https://printify.com"
            },
            {
                name: "Redbubble",
                category: "print-on-demand",
                description: "Artist marketplace for print-on-demand products including apparel, stickers, and home goods.",
                features: ["Artist community", "No upfront costs", "Global shipping", "Marketing tools", "Analytics"],
                url: "https://www.redbubble.com/sell"
            },
            {
                name: "Spring (Teespring)",
                category: "print-on-demand",
                description: "Platform for creating and selling custom apparel and merchandise with no upfront costs.",
                features: ["Free design tools", "YouTube integration", "Boosted listings", "Bulk discounts", "Analytics"],
                url: "https://www.spri.ng"
            },
            {
                name: "Society6",
                category: "print-on-demand",
                description: "Artist marketplace specializing in home decor, wall art, and lifestyle products.",
                features: ["Artist community", "Curated collections", "No inventory", "Global shipping", "Mobile app"],
                url: "https://society6.com/sell"
            },
            {
                name: "Shopify",
                category: "ecommerce",
                description: "Complete e-commerce platform for building your own online store with customizable themes.",
                features: ["Custom domain", "Payment processing", "Inventory management", "Marketing tools", "App store"],
                url: "https://www.shopify.com"
            },
            {
                name: "WooCommerce",
                category: "ecommerce",
                description: "Open-source e-commerce plugin for WordPress websites.",
                features: ["WordPress integration", "Flexible & customizable", "Extensions", "SEO friendly", "Free core plugin"],

            },
            {

                category: "ecommerce",
                description: "E-commerce platform integrated with Square's payment processing and POS systems.",
                features: ["Free plan available", "POS integration", "Pickup & delivery", "Instagram shopping", "Inventory sync"],
                url: "https://squareup.com/us/en/online-store"
            },
            {
                name: "BigCommerce",
                category: "ecommerce",
                description: "Enterprise-grade e-commerce platform with built-in features and scalability.",
                features: ["Multi-channel selling", "B2B features", "API-first", "No transaction fees", "Built-in SEO"],
                url: "https://www.bigcommerce.com"
            },
            {
                name: "Wix eCommerce",
                category: "ecommerce",
                description: "Website builder with integrated e-commerce functionality and drag-and-drop design.",
                features: ["Drag & drop builder", "Mobile optimized", "Abandoned cart recovery", "Multi-currency", "Tax calculator"],
                url: "https://www.wix.com/ecommerce/website"
            },
            {

                features: ["Global payments", "Subscription billing", "Fraud prevention", "Developer tools", "Mobile SDKs"],

            },

                features: ["Buyer protection", "International payments", "Invoice tools", "Mobile payments", "QR codes"],
                url: "https://www.paypal.com/us/business"
            },
            {
                name: "Square",
                category: "payment",
                description: "Payment processing with integrated POS systems and business tools.",
                features: ["POS system", "Online payments", "Invoicing", "Inventory management", "Analytics"],
                url: "https://squareup.com"
            },
            {
                name: "Mailchimp",
                category: "marketing",
                description: "Email marketing platform with automation and e-commerce integrations.",
                features: ["Email campaigns", "Automation", "Landing pages", "Social ads", "Analytics"],
                url: "https://mailchimp.com"
            },
            {
                name: "Hootsuite",
                category: "marketing",
                description: "Social media management platform for scheduling and analytics.",
                features: ["Multi-platform posting", "Content calendar", "Analytics", "Team collaboration", "Social listening"],
                url: "https://www.hootsuite.com"
            },
            {
                name: "Google Ads",
                category: "marketing",
                description: "Advertising platform for search, display, and shopping campaigns.",
                features: ["Search ads", "Shopping campaigns", "Display network", "YouTube ads", "Remarketing"],
                url: "https://ads.google.com"
            },
            {
                name: "Meta Ads",
                category: "marketing",
                description: "Social media advertising across Facebook, Instagram, Messenger, and the Audience Network.",
                features: ["Targeted audiences", "Instagram integration", "Retargeting", "A/B testing", "Analytics"],
                url: "https://www.facebook.com/business/ads"
            },
            {
                name: "Canva",
                category: "design",
                description: "Easy-to-use design platform for creating marketing materials and product mockups.",
                features: ["Templates", "Brand kit", "Photo editor", "Animation tools", "Team collaboration"],
                url: "https://www.canva.com"
            },
            {
                name: "Adobe Creative Cloud",
                category: "design",
                description: "Professional design suite including Photoshop, Illustrator, and more.",
                features: ["Photoshop", "Illustrator", "InDesign", "Cloud storage", "Mobile apps"],
                url: "https://www.adobe.com/creativecloud.html"
            },
            {
                name: "Figma",
                category: "design",
                description: "Collaborative design tool for creating UI/UX designs and prototypes.",
                features: ["Real-time collaboration", "Prototyping", "Design systems", "Plugins", "Version control"],
                url: "https://www.figma.com"
            },
            {
                name: "PicMonkey",
                category: "design",
                description: "Online photo editor and design tool for creating product images and marketing materials.",
                features: ["Photo editing", "Templates", "Brand kit", "Background remover", "Touch up tools"],
                url: "https://www.picmonkey.com"
            },
            {
                name: "ShipStation",
                category: "shipping",
                description: "Multi-carrier shipping software for e-commerce order fulfillment.",
                features: ["Multi-carrier support", "Batch printing", "Automation rules", "Branded tracking", "Returns portal"],
                url: "https://www.shipstation.com"
            },
            {
                name: "Pirate Ship",
                category: "shipping",
                description: "Free shipping software with discounted USPS and UPS rates.",
                features: ["No monthly fees", "Discounted rates", "Batch shipping", "Address validation", "Simple interface"],
                url: "https://www.pirateship.com"
            },
            {
                name: "Fulfillment by Amazon (FBA)",
                category: "shipping",
                description: "Amazon's fulfillment service for storage, packing, and shipping.",
                features: ["Prime eligibility", "Customer service", "Returns handling", "Global fulfillment", "Multi-channel"],
                url: "https://sell.amazon.com/fulfillment-by-amazon"
            },
            {
                name: "ShipBob",
                category: "shipping",
                description: "Third-party logistics provider with fulfillment centers across the US.",
                features: ["2-day shipping", "Inventory management", "Returns processing", "International shipping", "Analytics"],
                url: "https://www.shipbob.com"
            },
            {
                name: "Easyship",
                category: "shipping",
                description: "Global shipping platform with access to 250+ courier services.",
                features: ["Global reach", "Rate calculator", "Taxes & duties", "Tracking", "Insurance"],
                url: "https://www.easyship.com"
            }
        ];

        const categories = [
            { id: 'all',             label: 'All Resources' },
            { id: 'marketplace',     label: 'Marketplaces' },
            { id: 'print-on-demand', label: 'Print on Demand' },
            { id: 'ecommerce',       label: 'E-commerce Platforms' },
            { id: 'payment',         label: 'Payment Processing' },
            { id: 'marketing',       label: 'Marketing Tools' },
            { id: 'design',          label: 'Design Tools' },
            { id: 'shipping',        label: 'Shipping & Fulfillment' }
        ];

        const state = {
            category: 'all',
            search: ''
        };

        const grid = document.getElementById('resourcesGrid');
        const meta = document.getElementById('resultsMeta');
        const statCount = document.getElementById('statCount');
        const nav = document.getElementById('categoryNav');
        const searchInput = document.getElementById('searchInput');

        statCount.textContent = resources.length;

        function formatCategory(cat) {
            const entry = categories.find(c => c.id === cat);
            return entry ? entry.label : cat;
        }

        function buildCategoryNav() {
            const counts = resources.reduce((acc, r) => {
                acc[r.category] = (acc[r.category] || 0) + 1;
                return acc;
            }, {});
            nav.innerHTML = categories.map(c => {
                const n = c.id === 'all' ? resources.length : (counts[c.id] || 0);
                const active = c.id === state.category ? ' active' : '';
                return `<button class="category-btn${active}" data-category="${c.id}" type="button">${c.label}<span class="count">${n}</span></button>`;
            }).join('');
            nav.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.category = btn.dataset.category;
                    nav.querySelectorAll('.category-btn').forEach(b => b.classList.toggle('active', b === btn));
                    render();
                });
            });
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function filtered() {
            const q = state.search.trim().toLowerCase();
            return resources.filter(r => {
                if (state.category !== 'all' && r.category !== state.category) return false;
                if (!q) return true;
                if (r.name.toLowerCase().includes(q)) return true;
                if (r.description.toLowerCase().includes(q)) return true;
                if (formatCategory(r.category).toLowerCase().includes(q)) return true;
                return r.features.some(f => f.toLowerCase().includes(q));
            });
        }

        function render() {
            const list = filtered();
            meta.textContent = list.length === resources.length
                ? `Showing all ${list.length} resources`
                : `Showing ${list.length} of ${resources.length} resources`;

            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <h3>No resources found</h3>
                        <p>Try a different search term or category.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = list.map(r => `
                <article class="resource-card">
                    <div class="resource-head">
                        <h3>${escapeHtml(r.name)}</h3>
                        <span class="category-tag">${escapeHtml(formatCategory(r.category))}</span>
                    </div>
                    <p class="desc">${escapeHtml(r.description)}</p>
                    <div class="features">
                        <h4>Key Features</h4>
                        <ul>${r.features.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>
                    </div>
                    <a class="visit-link" href="${escapeHtml(r.url)}" target="_blank" rel="noopener noreferrer">
                        Visit <span class="arrow" aria-hidden="true">→</span>
                    </a>
                </article>
            `).join('');
        }

        searchInput.addEventListener('input', e => {
            state.search = e.target.value;
            render();
        });

        buildCategoryNav();
        render();
    </script>
</body>
</html>
